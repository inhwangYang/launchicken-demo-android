name: Launchicken Android Screenshot

on:
  workflow_dispatch:
    inputs:
      screens:
        description: "JSON array of screens to capture, sent by Launchicken"
        type: string
        required: false
        default: ""

jobs:
  android_screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect Launchicken screenshot plan
        run: |
          if [ -f launchicken/screenshots.yml ]; then
            echo "Launchicken screenshot plan found."
            sed -n '1,180p' launchicken/screenshots.yml
          else
            echo "No launchicken/screenshots.yml found. Launchicken will use default app launch behavior."
          fi
      - name: Export Launchicken plan path
        run: echo "LAUNCHICKEN_SCREENSHOT_PLAN=launchicken/screenshots.yml" >> "$GITHUB_ENV"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Build debug APK
        run: |
          mkdir -p build/launchicken/screenshots
          if [ -x ./gradlew ]; then
            ./gradlew assembleDebug
          else
            {
              echo "Launchicken placeholder artifact."
              echo "No gradlew found - add a Gradle wrapper so Launchicken can build the app."
            } > build/launchicken/screenshots/launchicken-placeholder.txt
          fi
      - name: Enable KVM for the emulator
        if: ${{ hashFiles('gradlew') != '' }}
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Write capture script
        if: ${{ hashFiles('gradlew') != '' }}
        run: |
          cat > .launchicken-capture.sh <<'CAPTURE_EOF'
          #!/usr/bin/env bash
          # The emulator action runs each script line in a separate shell, so all
          # capture logic lives in this file and is invoked as a single command.
          set -e
          mkdir -p build/launchicken/screenshots
          APK=$(find . -path '*build/outputs/apk/debug/*.apk' | head -n 1)
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          PKG=$("$BT/aapt" dump badging "$APK" 2>/dev/null | sed -n "s/^package: name='\([^']*\)'.*/\1/p")
          adb install -r "$APK"
          # Resolve the launcher component from the installed package - more robust
          # than aapt badging, which fails on manifests referencing framework resources.
          COMPONENT=$(adb shell cmd package resolve-activity --brief "$PKG" | tail -n 1 | tr -d '\r')
          case "$COMPONENT" in
            */*) echo "Launchicken capture target: $COMPONENT";;
            *) echo "::error::Could not resolve a launcher activity for $PKG."; exit 1;;
          esac
          SCREENS=$(echo "${LAUNCHICKEN_SCREENS:-}" | jq -r '.[].name' 2>/dev/null || true)
          if [ -z "$SCREENS" ]; then SCREENS="home settings"; fi
          adb shell input keyevent KEYCODE_WAKEUP || true
          adb shell wm dismiss-keyguard || true
          for SCREEN in $SCREENS; do
            adb shell am force-stop "$PKG" || true
            adb shell am start -n "$COMPONENT" --es launchicken_screen "$SCREEN"
            sleep 8
            if [ -z "$(adb shell pidof "$PKG" | tr -d '\r')" ]; then
              echo "::error::App exited before the '$SCREEN' screenshot (launchicken_screen=$SCREEN)."
              adb exec-out screencap -p > "build/launchicken/screenshots/launchicken-$SCREEN-failure.png" || true
              adb logcat -d -t 300 > "build/launchicken/screenshots/launchicken-$SCREEN-logcat.txt" || true
              exit 1
            fi
            adb exec-out screencap -p > "build/launchicken/screenshots/launchicken-$SCREEN.png"
            echo "captured launchicken-$SCREEN.png"
          done
          CAPTURE_EOF
          chmod +x .launchicken-capture.sh
      - name: Capture screenshots on emulator
        if: ${{ hashFiles('gradlew') != '' }}
        uses: reactivecircus/android-emulator-runner@v2
        env:
          LAUNCHICKEN_SCREENS: ${{ inputs.screens }}
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: bash ./.launchicken-capture.sh
      - name: Upload screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: launchicken-android-screenshots-${{ github.run_id }}
          path: build/launchicken/screenshots
